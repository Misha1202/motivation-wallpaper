<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Библейские обои</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 10px;
        }
        .container {
            width: 100%;
            max-width: 430px;
            margin: 0 auto;
        }
        .wallpaper-card {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .wallpaper-image {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 1170/2532;
            background: #f0f0f0;
            transition: opacity 0.3s ease;
        }
        .wallpaper-image.loading {
            opacity: 0.5;
        }
        .controls {
            padding: 20px;
            background: white;
            text-align: center;
        }
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
        }
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }
        .refresh-btn:active {
            transform: translateY(0);
        }
        .info {
            margin-top: 15px;
            color: #666;
            font-size: 14px;
        }
        .quote-id {
            background: #f5f5f5;
            padding: 5px 10px;
            border-radius: 20px;
            display: inline-block;
            font-size: 12px;
            color: #666;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 12px;
        }
        .footer a {
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wallpaper-card">
            <img class="wallpaper-image" id="wallpaper" src="" alt="Библейские обои">
            <div class="controls">
                <button class="refresh-btn" onclick="loadNewWallpaper()">
                    🔄 Новая цитата
                </button>
                <div class="info">
                    <span class="quote-id" id="quoteId">Загрузка...</span>
                </div>
            </div>
        </div>
        <div class="footer">
            <p>📖 Библейские цитаты • <a href="#" onclick="loadNewWallpaper();return false;">Обновить</a></p>
        </div>
    </div>

    <script>
        // Адрес вашего сервера на Render
        const API_URL = 'https://bible-wallpaper-api.onrender.com'; // ЗАМЕНИТЕ НА ВАШ URL
        
        // Массив ID цитат (можно загрузить с сервера)
        const QUOTE_IDS = [162, 15, 28, 39, 51, 95, 121, 155, 188, 217, 2, 3, 4, 5, 6, 7, 8, 9, 10];
        
        function getRandomQuoteId() {
            return QUOTE_IDS[Math.floor(Math.random() * QUOTE_IDS.length)];
        }
        
        async function loadWallpaper(quoteId) {
            const img = document.getElementById('wallpaper');
            const quoteIdElement = document.getElementById('quoteId');
            
            img.classList.add('loading');
            
            // Добавляем timestamp для избежания кэширования
            const timestamp = new Date().getTime();
            const imageUrl = `${API_URL}/generate/${quoteId}?t=${timestamp}`;
            
            quoteIdElement.textContent = `Цитата #${quoteId}`;
            
            // Создаем новый объект Image для предзагрузки
            const newImg = new Image();
            newImg.onload = function() {
                img.src = this.src;
                img.classList.remove('loading');
            };
            newImg.onerror = function() {
                console.error('Ошибка загрузки');
                img.classList.remove('loading');
                quoteIdElement.textContent = 'Ошибка загрузки';
            };
            newImg.src = imageUrl;
            
            // Обновляем URL
            const url = new URL(window.location);
            url.searchParams.set('quote', quoteId);
            window.history.pushState({}, '', url);
        }
        
        function loadNewWallpaper() {
            const quoteId = getRandomQuoteId();
            loadWallpaper(quoteId);
        }
        
        // Загружаем при старте
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            let quoteId = urlParams.get('quote');
            
            if (!quoteId) {
                quoteId = getRandomQuoteId();
            }
            
            loadWallpaper(quoteId);
        });
    </script>
</body>
</html>
